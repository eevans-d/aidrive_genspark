name: OCR Runtime Recheck

on:
  push:
    branches:
      - codex/ocr-runtime-recheck-20260313
  workflow_dispatch:
    inputs:
      factura_id:
        description: Optional factura_id to recheck. If omitted, the workflow selects the latest error candidate.
        required: false
        default: ''

jobs:
  ocr-runtime-recheck:
    name: OCR Runtime Recheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Recheck OCR runtime against production
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          INPUT_FACTURA_ID: ${{ github.event.inputs.factura_id }}
        run: |
          set -euo pipefail

          mkdir -p test-reports
          REPORT_FILE="test-reports/ocr-runtime-recheck.txt"
          : > "$REPORT_FILE"

          echo "OCR runtime recheck - $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$REPORT_FILE"
          echo "Target: production facturas-ocr" >> "$REPORT_FILE"
          echo "Selection strategy: explicit factura_id or latest estado=error candidate" >> "$REPORT_FILE"
          echo >> "$REPORT_FILE"

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] || [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "MISSING_CONFIG SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY or SUPABASE_DB_URL" >> "$REPORT_FILE"
            echo "## OCR Runtime Recheck" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: SKIPPED (missing configuration)" >> "$GITHUB_STEP_SUMMARY"
            cat "$REPORT_FILE"
            exit 0
          fi

          if ! command -v psql >/dev/null 2>&1; then
            echo "MISSING_TOOL psql" >> "$REPORT_FILE"
            echo "## OCR Runtime Recheck" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: SKIPPED (psql unavailable)" >> "$GITHUB_STEP_SUMMARY"
            cat "$REPORT_FILE"
            exit 0
          fi

          sql_escape() {
            printf "%s" "$1" | sed "s/'/''/g"
          }

          run_sql() {
            psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -P footer=off -At -F $'\t' -c "$1"
          }

          candidate_id="${INPUT_FACTURA_ID:-}"
          selection_source="workflow_dispatch.input"

          if [ -z "$candidate_id" ]; then
            candidate_id="$(run_sql "select id from public.facturas_ingesta where estado = 'error' and imagen_url is not null order by updated_at desc nulls last limit 1;")"
            selection_source="public.facturas_ingesta.estado=error"
          fi

          if [ -z "$candidate_id" ]; then
            echo "NO_CANDIDATE no factura with estado=error and imagen_url found" >> "$REPORT_FILE"
            echo "## OCR Runtime Recheck" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: SKIPPED (no OCR candidate found)" >> "$GITHUB_STEP_SUMMARY"
            cat "$REPORT_FILE"
            exit 0
          fi

          candidate_id_escaped="$(sql_escape "$candidate_id")"
          before_row="$(run_sql "select coalesce(estado,''), coalesce(imagen_url,''), coalesce(updated_at::text,''), coalesce(score_confianza::text,'') from public.facturas_ingesta where id = '$candidate_id_escaped' limit 1;")"
          if [ -z "$before_row" ]; then
            echo "MISSING_FACTURA candidate=$candidate_id" >> "$REPORT_FILE"
            echo "## OCR Runtime Recheck" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: SKIPPED (candidate not found)" >> "$GITHUB_STEP_SUMMARY"
            cat "$REPORT_FILE"
            exit 0
          fi

          before_estado="$(printf '%s' "$before_row" | cut -f1)"
          before_imagen_url="$(printf '%s' "$before_row" | cut -f2)"
          before_updated_at="$(printf '%s' "$before_row" | cut -f3)"
          before_score="$(printf '%s' "$before_row" | cut -f4)"

          echo "Candidate factura_id: $candidate_id" >> "$REPORT_FILE"
          echo "Candidate source: $selection_source" >> "$REPORT_FILE"
          echo "Before estado: $before_estado" >> "$REPORT_FILE"
          echo "Before updated_at: $before_updated_at" >> "$REPORT_FILE"
          echo "Before score_confianza: ${before_score:-null}" >> "$REPORT_FILE"
          echo "Imagen path present: $([ -n "$before_imagen_url" ] && echo "yes" || echo "no")" >> "$REPORT_FILE"
          echo >> "$REPORT_FILE"

          response_file="$(mktemp)"
          response_status="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST "$SUPABASE_URL/functions/v1/facturas-ocr" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            --max-time 80 \
            --data "{\"factura_id\":\"$candidate_id\"}")"
          response_body="$(cat "$response_file")"

          sleep 5

          after_row="$(run_sql "select coalesce(estado,''), coalesce(updated_at::text,''), coalesce(score_confianza::text,'') from public.facturas_ingesta where id = '$candidate_id_escaped' limit 1;")"
          latest_event_row="$(run_sql "select coalesce(tipo,''), coalesce(created_at::text,''), coalesce(datos::text,'') from public.facturas_ingesta_eventos where factura_id = '$candidate_id_escaped' order by created_at desc limit 1;")"

          after_estado="$(printf '%s' "$after_row" | cut -f1)"
          after_updated_at="$(printf '%s' "$after_row" | cut -f2)"
          after_score="$(printf '%s' "$after_row" | cut -f3)"
          latest_event_type="$(printf '%s' "$latest_event_row" | cut -f1)"
          latest_event_created_at="$(printf '%s' "$latest_event_row" | cut -f2)"
          latest_event_payload="$(printf '%s' "$latest_event_row" | cut -f3)"

          echo "Invocation HTTP status: $response_status" >> "$REPORT_FILE"
          echo "Response body: $response_body" >> "$REPORT_FILE"
          echo >> "$REPORT_FILE"
          echo "After estado: $after_estado" >> "$REPORT_FILE"
          echo "After updated_at: $after_updated_at" >> "$REPORT_FILE"
          echo "After score_confianza: ${after_score:-null}" >> "$REPORT_FILE"
          echo "Latest event type: $latest_event_type" >> "$REPORT_FILE"
          echo "Latest event created_at: $latest_event_created_at" >> "$REPORT_FILE"
          echo "Latest event payload: $latest_event_payload" >> "$REPORT_FILE"

          echo "## OCR Runtime Recheck" >> "$GITHUB_STEP_SUMMARY"
          echo "- Candidate factura_id: \`$candidate_id\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Candidate source: \`$selection_source\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Before estado: \`$before_estado\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Invocation HTTP status: \`$response_status\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- After estado: \`$after_estado\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest event: \`$latest_event_type\`" >> "$GITHUB_STEP_SUMMARY"

          case "$response_status" in
            200)
              echo "- Status: PASS" >> "$GITHUB_STEP_SUMMARY"
              echo "OCR_RUNTIME_STATUS=pass" >> "$GITHUB_ENV"
              ;;
            409)
              echo "- Status: WARN (candidate not eligible at runtime)" >> "$GITHUB_STEP_SUMMARY"
              echo "OCR_RUNTIME_STATUS=warn" >> "$GITHUB_ENV"
              ;;
            *)
              echo "- Status: FAIL" >> "$GITHUB_STEP_SUMMARY"
              echo "OCR_RUNTIME_STATUS=fail" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Upload OCR runtime artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ocr-runtime-recheck
          path: test-reports/ocr-runtime-recheck.txt
          retention-days: 7

      - name: Fail if OCR runtime still errors
        if: env.OCR_RUNTIME_STATUS == 'fail'
        run: exit 1
